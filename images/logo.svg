<!-- Event Club Logo SVG - Academic, Fancy, with Icon -->
<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="60" cy="60" r="56" fill="#2c3e50" stroke="#3498db" stroke-width="6"/>
  <!-- Graduation Cap -->
  <g>
    <polygon points="60,32 90,45 60,58 30,45" fill="#e74c3c" stroke="#fff" stroke-width="2"/>
    <rect x="54" y="58" width="12" height="12" rx="3" fill="#fff" stroke="#2c3e50" stroke-width="2"/>
    <rect x="57" y="70" width="6" height="12" rx="2" fill="#e74c3c"/>
    <circle cx="60" cy="83" r="2.5" fill="#e74c3c"/>
  </g>
  <!-- EC Initials -->
  <text x="60" y="105" text-anchor="middle" font-family="Georgia, serif" font-size="32" font-weight="bold" fill="#fff" stroke="#3498db" stroke-width="1.5" paint-order="stroke">EC</text>
</svg>
